<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SecureVote</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box auth-box-large">
            <div class="auth-header">
                <div class="logo-icon-large">🗳️</div>
                <h1>SecureVote</h1>
                <p>Create Your Account</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" name="regEmail" placeholder="Enter your email" required>
                    <span class="error-message" id="regEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" name="regPassword" placeholder="At least 8 characters" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                    <span class="error-message" id="passwordMatchError"></span>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the Terms and Conditions</label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <div class="auth-divider">
                <span>Already have an account?</span>
            </div>

            <a href="login.html" class="btn btn-secondary btn-full">Login Here</a>
        </div>

        <div class="auth-animation">
            <div class="animated-gradient"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
